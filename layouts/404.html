{{ define "main" }}
  <section
    class="container py-3 py-md-5 min-vh-100 d-flex justify-content-center align-items-center bg-body"
  >
    <div class="text-center">
      <h2 class="d-flex justify-content-center align-items-center gap-2 mb-4">
        <p class="display-1 fw-bold">4</p>
        <i class="bi bi-exclamation-circle display-4"></i>
        <p class="display-1 fw-bold">4</p>
      </h2>
      <h3 class="h2 mb-2">{{ T "error404.title" }}</h3>
      <p class="mb-5">
        {{ T "error404.message" | safeHTML }}
      </p>
      <a
        class="btn btn-secondary rounded-pill px-5 fs-6 m-0"
        href="{{ .Site.Home.RelPermalink }}"
        role="button"
        >{{ T "error404.backHome" }}</a
      >
    </div>
  </section>
{{ end }}
